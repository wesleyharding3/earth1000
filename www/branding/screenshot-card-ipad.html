<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Earth00 — Screenshot Card (iPad)</title>
<style>
  /* ─────────────────────────────────────────────────────────────────────
     App Store screenshot card — iPad 13" tier (2064 × 2752).
     Mirrors screenshot-card.html but adapts to the wider iPad canvas
     aspect. The source iPhone screenshot is letterboxed inside the
     bottom area; brand-black "negative space" on either side reads as
     intentional breathing room rather than awkward gap.
  ─────────────────────────────────────────────────────────────────────── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body { position: relative; width: 100vw; height: 100vh; }

  #wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2064px;
    height: 2752px;
    transform: translate(-50%, -50%);
    transform-origin: center center;
  }

  #stage {
    position: relative;
    width: 2064px;
    height: 2752px;
    background: radial-gradient(ellipse at center top, #0a0d14 0%, #000 70%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.85;
  }

  /* Header strip — slightly shorter than iPhone (18%) since the iPad
     canvas is wider/squarer and the screenshot's letterboxed bottom
     area benefits from extra vertical space. */
  .header {
    position: relative;
    height: 495px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 100px;
    text-align: center;
    z-index: 2;
  }

  .headline {
    font-family: "Georgia", "Times New Roman", serif;
    font-style: italic;
    font-weight: 900;
    font-size: 110px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: rgba(255, 175, 50, 1);
    text-shadow:
      0 0 36px rgba(255, 140, 30, 0.5),
      0 0 100px rgba(255, 100, 20, 0.25);
    max-width: 1700px;
  }

  .subtitle {
    margin-top: 32px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 400;
    font-size: 44px;
    line-height: 1.35;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.78);
    max-width: 1500px;
  }

  body.no-subtitle .subtitle { display: none; }

  /* Screenshot zone — bottom 82% of canvas. The iPhone screenshot fits
     by height (object-fit: contain on the wrapper). Black bars on the
     sides are intentional and brand-consistent. */
  .shot-wrap {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 2;
    padding: 40px 0;
  }
  .shot {
    height: 100%;
    width: auto;
    max-width: 100%;
    display: block;
    /* Stronger glow than the iPhone variant — separates the phone-
       sized screenshot from the wide negative space on either side. */
    filter:
      drop-shadow(0 0 48px rgba(255, 140, 30, 0.12))
      drop-shadow(0 0 24px rgba(0, 0, 0, 0.85));
  }
</style>
</head>
<body>

<div id="wrap">
<div id="stage">
  <canvas id="stars" width="2064" height="2752"></canvas>

  <header class="header">
    <div class="headline" id="headline">Headline</div>
    <div class="subtitle" id="subtitle">Subtitle</div>
  </header>

  <div class="shot-wrap">
    <img class="shot" id="shot" alt="" />
  </div>
</div>
</div>

<script>
/* Fit stage to viewport */
(function fitStage() {
  const wrap = document.getElementById('wrap');
  function fit() {
    const sx = window.innerWidth  / 2064;
    const sy = window.innerHeight / 2752;
    wrap.style.transform = `translate(-50%, -50%) scale(${Math.min(sx, sy)})`;
  }
  fit();
  window.addEventListener('resize', fit);
})();

/* Starfield — same seed as intro/outro/screenshot-card so constellations
   stay consistent across the entire App Store listing. */
(function drawStars() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let seed = 1337;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const W = canvas.width, H = canvas.height;
  const N = 480;
  for (let i = 0; i < N; i++) {
    const x = rand() * W;
    const y = rand() * H;
    const size = rand() * 1.6 + 0.3;
    const warm = rand() < 0.28;
    const hue = warm ? (32 + rand() * 20) : (200 + rand() * 60);
    const sat = warm ? (60 + rand() * 40) : (10 + rand() * 20);
    const op  = rand() * 0.5 + 0.25;
    const r = size * 3;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   `hsla(${hue}, ${sat}%, 90%, ${op})`);
    g.addColorStop(0.4, `hsla(${hue}, ${sat}%, 70%, ${op * 0.4})`);
    g.addColorStop(1,   `hsla(${hue}, ${sat}%, 50%, 0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `hsla(${hue}, ${sat}%, 95%, ${op})`;
    ctx.beginPath(); ctx.arc(x, y, size * 0.55, 0, Math.PI * 2); ctx.fill();
  }
})();

/* URL params */
(function applyParams() {
  const QS = new URLSearchParams(location.search);
  const headline = QS.get('headline');
  const subtitle = QS.get('subtitle');
  const img      = QS.get('img');

  if (headline) document.getElementById('headline').textContent = headline;
  if (subtitle) document.getElementById('subtitle').textContent = subtitle;
  else document.body.classList.add('no-subtitle');
  if (img) document.getElementById('shot').src = img;
})();
</script>

</body>
</html>
