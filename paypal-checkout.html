<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Earth Checkout</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --panel: rgba(255, 252, 247, 0.92);
      --ink: #1f2720;
      --muted: #607062;
      --accent: #1f5b46;
      --border: rgba(31, 39, 32, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(31,91,70,0.16), transparent 32%),
        linear-gradient(135deg, #ede4d4 0%, #f8f4ec 45%, #efe7da 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 560px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(31, 39, 32, 0.12);
      backdrop-filter: blur(12px);
    }
    .eyebrow {
      font: 700 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 6vw, 48px);
      line-height: 0.95;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font: 600 13px/1.2 ui-sans-serif, system-ui, sans-serif;
      background: rgba(255,255,255,0.65);
    }
    #paypal-button-container {
      min-height: 54px;
    }
    .message {
      margin-top: 14px;
      font: 500 14px/1.5 ui-sans-serif, system-ui, sans-serif;
      color: var(--muted);
    }
    .message.error { color: #9a2f2f; }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 22px;
      color: var(--accent);
      text-decoration: none;
      font: 600 14px/1.2 ui-sans-serif, system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Earth Subscription</div>
    <h1 id="checkoutTitle">Secure checkout</h1>
    <p id="checkoutCopy">Confirm your subscription with PayPal to unlock premium Earth access.</p>
    <div class="meta">
      <div class="chip" id="checkoutTier">Tier: ...</div>
      <div class="chip" id="checkoutEnv">Env: ...</div>
    </div>
    <div id="paypal-button-container"></div>
    <div id="checkoutMessage" class="message"></div>
    <a class="back" href="/">Back to Earth</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function () {
    const API_BASE = window.__API_BASE || 'https://earth-wjr6.onrender.com';
    const SUPABASE_URL = 'https://hqzabwjwuszupxwookgx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9mT1GessoNyi5cvPN-PSbw_IcTydubW';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const tier = (params.get('tier') || '').toLowerCase();
    const tierLabel = tier === 'enterprise' ? 'Enterprise' : 'Pro';
    const tierEl = document.getElementById('checkoutTier');
    const envEl = document.getElementById('checkoutEnv');
    const titleEl = document.getElementById('checkoutTitle');
    const copyEl = document.getElementById('checkoutCopy');
    const messageEl = document.getElementById('checkoutMessage');

    if (!['pro', 'enterprise'].includes(tier)) {
      messageEl.textContent = 'Unknown subscription tier.';
      messageEl.classList.add('error');
      return;
    }

    tierEl.textContent = `Tier: ${tierLabel}`;
    titleEl.textContent = `${tierLabel} checkout`;
    copyEl.textContent = `Finish subscribing to Earth ${tierLabel} with PayPal.`;

    function setMessage(text, isError = false) {
      messageEl.textContent = text || '';
      messageEl.classList.toggle('error', Boolean(isError));
    }

    async function run() {
      const { data: sessionData } = await sb.auth.getSession();
      const authToken = sessionData?.session?.access_token || null;
      if (!authToken) {
        setMessage('Please sign in on Earth first, then reopen checkout.', true);
        return;
      }

      const cfgRes = await fetch(`${API_BASE}/api/payments/paypal/config`, {
        headers: { Authorization: `Bearer ${authToken}` }
      });
      const cfg = await cfgRes.json().catch(() => ({}));
      if (!cfgRes.ok) {
        setMessage(cfg.error || 'PayPal configuration is unavailable.', true);
        return;
      }

      envEl.textContent = `Env: ${cfg.env}`;
      const planId = tier === 'pro' ? cfg.planIdPro : cfg.planIdEnterprise;
      if (!planId) {
        setMessage('This subscription plan is not configured.', true);
        return;
      }

      const script = document.createElement('script');
      script.src = `${cfg.sdkBase}/sdk/js?client-id=${encodeURIComponent(cfg.clientId)}&vault=true&intent=subscription`;
      script.setAttribute('data-sdk-integration-source', 'button-factory');
      script.onload = () => {
        if (typeof paypal === 'undefined') {
          setMessage('PayPal failed to load.', true);
          return;
        }
        paypal.Buttons({
          style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'subscribe', height: 42 },
          createSubscription: (_data, actions) => actions.subscription.create({ plan_id: planId }),
          onApprove: async (data) => {
            setMessage('Activating your subscription...');
            const res = await fetch(`${API_BASE}/api/payments/paypal/activate`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${authToken}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ subscriptionId: data.subscriptionID, tier })
            });
            const result = await res.json().catch(() => ({}));
            if (!res.ok || !result.success) {
              setMessage(result.error || 'Activation failed. Please contact support.', true);
              return;
            }
            window.location.href = `/?subscription=success&tier=${encodeURIComponent(tier)}`;
          },
          onError: (err) => {
            console.error('[paypal checkout]', err);
            setMessage('PayPal checkout failed to start. Please try again.', true);
          }
        }).render('#paypal-button-container');
      };
      script.onerror = () => setMessage('Could not load PayPal checkout.', true);
      document.head.appendChild(script);
    }

    run().catch((err) => {
      console.error('[paypal checkout init]', err);
      setMessage('Checkout could not be initialized.', true);
    });
  })();
  </script>
</body>
</html>
